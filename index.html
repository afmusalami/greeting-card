<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sadara Eid Greeting</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
font-family:Arial,Helvetica,sans-serif;
background:#f7f2e9;
width:100%;
min-height:100%;
overflow-x:hidden
}

.screen{display:none;width:100%;min-height:100vh}
.screen.active{display:block}

/* ---------------- LANDING ---------------- */

.landing{
position:relative;
width:100%;
min-height:100vh;
overflow:hidden
}

.layer{
position:absolute;
pointer-events:none
}

.bg{inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.logo{top:5%;left:4%;width:15%;max-width:240px;z-index:3}
.eid{top:23%;left:6%;width:28%;max-width:420px;z-index:3}
.msg{top:56%;left:4%;width:40%;max-width:600px;z-index:3}
.plant{right:0;bottom:0;width:55%;max-width:900px;z-index:2}

/* input */

.input-area{
position:absolute;
left:4%;
bottom:10%;
width:30%;
max-width:550px;
z-index:5
}

.input-wrap{
width:100%;
height:60px;
background:rgba(255,255,255,0.96);
border-radius:999px;
display:flex;
align-items:center;
padding:6px;
box-shadow:0 10px 30px rgba(0,0,0,0.08)
}

.input-wrap input{
flex:1;
min-width:0;
border:none;
outline:none;
background:transparent;
text-align:center;
font-size:18px;
color:#666;
padding:0 12px
}

.send-btn{
background:#575757;
color:#fff;
border:none;
border-radius:999px;
height:48px;
padding:0 24px;
font-size:18px;
font-weight:700;
cursor:pointer;
flex-shrink:0
}

/* language switch */

.lang-switch{
position:absolute;
right:3%;
bottom:3%;
display:flex;
background:#555;
border-radius:999px;
overflow:hidden;
z-index:6
}

.lang-btn{
background:transparent;
color:#fff;
border:none;
padding:12px 18px;
font-weight:700;
cursor:pointer
}

.lang-btn.active{background:rgba(255,255,255,0.15)}

/* ---------------- PREVIEW ---------------- */

.preview-screen{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
background:#07111e;
padding:24px 16px;
gap:18px
}

.preview-screen.active{display:flex}

.card-export{
width:min(430px,100%);
aspect-ratio:9/16;
border-radius:26px;
overflow:hidden;
position:relative;
box-shadow:0 20px 50px rgba(0,0,0,0.25)
}

.card-export img{width:100%;height:100%;object-fit:cover}

.card-name{
position:absolute;
left:50%;
transform:translateX(-50%);
width:78%;
text-align:center;
font-weight:900;
color:#2b2b2b;
font-size:clamp(26px,4vw,36px);
line-height:1.15;
text-shadow:none
}

.card-name.en{top:52%}
.card-name.ar{top:47%;direction:rtl}
.card-name.both{top:55%}

.actions{
width:min(430px,100%);
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

.action-btn{
height:58px;
border-radius:999px;
border:none;
font-size:20px;
font-weight:700;
cursor:pointer
}

.action-btn.primary{background:linear-gradient(180deg,#3f83ff,#2f6ff1);color:white}
.action-btn.secondary{background:rgba(255,255,255,0.06);color:white}

/* ---------------- MOBILE ---------------- */

@media(max-width:900px){

.logo{top:6%;left:6%;width:32%}
.eid{top:18%;left:50%;transform:translateX(-50%);width:70%}
.msg{top:43%;left:50%;transform:translateX(-50%);width:80%}
.plant{width:100%;opacity:.95}

.input-area{
left:15%;
bottom:35%;
width:70%
}

.input-wrap{
height:54px
}

.input-wrap input{
min-width:0;
font-size:15px;
padding:0 10px
}

.send-btn{
min-width:84px;
height:40px;
font-size:15px;
padding:0 14px
}

.lang-switch{
right:50%;
transform:translateX(50%);
bottom:2.5%
}

}

@media(max-width:560px){

.input-area{
left:15%;
bottom:35%;
width:70%
}

.input-wrap{
height:52px
}

.input-wrap input{
min-width:0;
font-size:14px;
padding:0 8px
}

.send-btn{
min-width:78px;
height:38px;
font-size:14px;
padding:0 12px
}

.lang-btn{
padding:10px 14px;
font-size:13px
}

.action-btn{
font-size:17px;
height:54px
}

}
</style>
</head>

<body>

<section id="landingScreen" class="screen active">

<div class="landing">

<img class="layer bg" src="BG-horizontal.png">
<img class="layer logo" src="Logo-horizontal.png">
<img class="layer eid" src="Eid-Mubarak-horizontal.png">
<img id="msgImage" class="layer msg" src="Best-Wishes-Bi-horizontal.png">
<img class="layer plant" src="Icon-horizontal.png">

<div class="input-area">
<div class="input-wrap">
<input id="nameInput" type="text" placeholder="...اكتب اسمك هنا">
<button id="sendBtn" class="send-btn">Send</button>
</div>
</div>

<div class="lang-switch">
<button class="lang-btn" data-lang="en">EN</button>
<button class="lang-btn" data-lang="ar">عربي</button>
<button class="lang-btn active" data-lang="both">AR&EN</button>
</div>

</div>

</section>

<section id="previewScreen" class="preview-screen">

<div id="exportCard" class="card-export">
<img id="cardBase" src="Cards_Bi.png">
<div id="cardName" class="card-name both">Ahmed</div>
</div>

<div class="actions">
<button id="downloadBtn" class="action-btn primary">⬇ Download Card</button>
<button id="newCardBtn" class="action-btn secondary">↻ New Card</button>
</div>

</section>

<script>

const landingScreen=document.getElementById('landingScreen')
const previewScreen=document.getElementById('previewScreen')

const nameInput=document.getElementById('nameInput')
const sendBtn=document.getElementById('sendBtn')

const msgImage=document.getElementById('msgImage')
const cardBase=document.getElementById('cardBase')
const cardName=document.getElementById('cardName')

const downloadBtn=document.getElementById('downloadBtn')
const newCardBtn=document.getElementById('newCardBtn')

let lang='both'

const config={

en:{
msg:'Best-Wishes-Eng-horizontal.png',
card:'Cards_Eng.png',
nameClass:'en',
placeholder:'Write your name here...',
dir:'ltr'
},

ar:{
msg:'Best-Wishes-Ar-horizontal.png',
card:'Cards_Ar.png',
nameClass:'ar',
placeholder:'...اكتب اسمك هنا',
dir:'rtl'
},

both:{
msg:'Best-Wishes-Bi-horizontal.png',
card:'Cards_Bi.png',
nameClass:'both',
placeholder:'...اكتب اسمك هنا',
dir:'rtl'
}
}

function applyLang(l){

lang=l

const d=config[l]

msgImage.src=d.msg
cardBase.src=d.card

nameInput.placeholder=d.placeholder
nameInput.dir=d.dir

cardName.className='card-name '+d.nameClass

document.querySelectorAll('.lang-btn').forEach(b=>{
b.classList.toggle('active',b.dataset.lang===l)
})

}

document.querySelectorAll('.lang-btn').forEach(btn=>{
btn.onclick=()=>applyLang(btn.dataset.lang)
})

sendBtn.onclick=()=>{

const name=nameInput.value.trim()

if(!name){
alert(lang==='ar'?'يرجى كتابة الاسم':'Please enter your name')
return
}

cardName.textContent=name

landingScreen.classList.remove('active')
previewScreen.classList.add('active')

}

newCardBtn.onclick=()=>{

previewScreen.classList.remove('active')
landingScreen.classList.add('active')

nameInput.value=''

}

downloadBtn.onclick=async()=>{

  const canvas=document.createElement('canvas')
  canvas.width=900
  canvas.height=1600

  const ctx=canvas.getContext('2d')

  const img=new Image()
  img.crossOrigin='anonymous'
  img.src=cardBase.src

  img.onload=()=>{

    ctx.drawImage(img,0,0,canvas.width,canvas.height)

    ctx.fillStyle='#2b2b2b'
    ctx.textAlign='center'
    ctx.textBaseline='top'
    ctx.font='900 64px Arial'

    const text=cardName.textContent || ''
    const centerX=canvas.width/2

    let y=0
    if(lang==='en') y=canvas.height*0.52
    if(lang==='ar') y=canvas.height*0.47
    if(lang==='both') y=canvas.height*0.55

    ctx.fillText(text,centerX,y)

    const link=document.createElement('a')
    link.download='sadara-eid-card.png'
    link.href=canvas.toDataURL('image/png')
    link.click()
  }

}

applyLang('both')

</script>

</body>
</html>
