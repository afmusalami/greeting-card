<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sadara Test</title>
  <style>
    body {
      margin: 0;
      background: #e9e4da;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .wrap {
      padding: 20px;
    }

    img {
      max-width: 90%;
      height: auto;
      display: block;
      margin: 20px auto;
      border: 1px solid #ccc;
    }

    .row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    input {
      padding: 12px 16px;
      border-radius: 30px;
      border: none;
      width: 260px;
    }

    button {
      padding: 12px 20px;
      border-radius: 30px;
      border: none;
      background: #555;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Image Loading Test</h2>

    <img src="Logo-horizontal.png" alt="Logo">
    <img src="Eid Mubarak-horizontal.png" alt="Eid Title">
    <img src="Best-Wishes-Bi-horizontal.png" alt="Message">
    <img src="Icon-horizontal.png" alt="Plant">
    <img src="BG-horizontal.png" alt="Background">

    <div class="row">
      <input placeholder="Write your name here...">
      <button>Send</button>
    </div>
  </div>
</body>
</html>
