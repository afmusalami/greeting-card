<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sadara Greeting Card</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #e9e4da;
    }

    body {
      overflow-x: hidden;
    }

    .screen {
      display: none;
      width: 100%;
      min-height: 100vh;
    }

    .screen.active {
      display: block;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #e9e4da;
    }

    .desktop-layer {
      display: block;
    }

    .mobile-layer {
      display: none;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .logo {
      position: absolute;
      top: 5%;
      left: 4%;
      width: 15.5%;
      max-width: 250px;
      min-width: 110px;
      z-index: 5;
    }

    .eid-title {
      position: absolute;
      top: 23%;
      left: 6%;
      width: 27%;
      max-width: 460px;
      min-width: 180px;
      z-index: 5;
    }

    .message {
      position: absolute;
      left: 3.8%;
      top: 57%;
      width: 39%;
      max-width: 760px;
      min-width: 240px;
      z-index: 5;
    }

    .plant {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 55%;
      max-width: 980px;
      z-index: 4;
    }

    .input-area {
      position: absolute;
      left: 7.2%;
      bottom: 10.5%;
      width: 30%;
      min-width: 300px;
      z-index: 10;
      transition: bottom 0.2s ease, left 0.2s ease;
    }

    .page.lang-both .input-area {
      bottom: 7%;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.96);
      border-radius: 999px;
      padding: 5px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 18px;
      color: #6b6b6b;
      padding: 14px 20px;
      text-align: center;
    }

    .input-wrap input::placeholder {
      color: #7b7b7b;
      opacity: 1;
    }

    .send-btn {
      border: none;
      background: #5a5a5a;
      color: #fff;
      border-radius: 999px;
      padding: 14px 32px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      min-width: 110px;
    }

    .lang-switch {
      position: absolute;
      right: 3.5%;
      bottom: 4.3%;
      display: flex;
      align-items: center;
      background: #6a6a6a;
      border-radius: 999px;
      padding: 4px;
      z-index: 10;
      gap: 2px;
    }

    .lang-switch button {
      border: none;
      background: transparent;
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-width: 62px;
    }

    .lang-switch button.active {
      background: rgba(255,255,255,0.14);
    }

    .preview-screen {
      min-height: 100vh;
      background: #07111e;
      display: none;
      padding: 26px 16px 34px;
    }

    .preview-screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .card-shell {
      width: min(430px, 100%);
    }

    .card-export {
      width: 100%;
      aspect-ratio: 9 / 16;
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      background: #efe8dc;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .card-export img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .card-name {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 76%;
      text-align: center;
      color: #6d6d6d;
      font-weight: 800;
      line-height: 1.12;
      word-break: break-word;
      font-size: clamp(24px, 4vw, 34px);
      z-index: 5;
    }

    .card-name.en {
      top: 52.8%;
      direction: ltr;
    }

    .card-name.ar {
      top: 46.8%;
      direction: rtl;
    }

    .card-name.both {
      top: 57%;
      direction: ltr;
    }

    .actions {
      width: min(430px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .action-btn {
      border: none;
      cursor: pointer;
      height: 58px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
    }

    .action-btn.primary {
      background: linear-gradient(180deg, #3f83ff 0%, #2f6ff1 100%);
      color: white;
    }

    .action-btn.secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* hidden render canvas */
    .render-area {
      position: fixed;
      left: -99999px;
      top: -99999px;
      width: 900px;
      height: 1600px;
      pointer-events: none;
      opacity: 0;
    }

    .render-card {
      width: 900px;
      height: 1600px;
      position: relative;
      overflow: hidden;
      background: #efe8dc;
    }

    .render-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .render-name {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 76%;
      text-align: center;
      color: #6d6d6d;
      font-weight: 800;
      line-height: 1.12;
      word-break: break-word;
      font-size: 64px;
      z-index: 5;
      font-family: Arial, Helvetica, sans-serif;
    }

    .render-name.en {
      top: 52.8%;
      direction: ltr;
    }

    .render-name.ar {
      top: 46.8%;
      direction: rtl;
    }

    .render-name.both {
      top: 57%;
      direction: ltr;
    }

    @media (max-width: 900px) {
      .desktop-layer {
        display: none;
      }

      .mobile-layer {
        display: block;
      }

      .mobile-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      .input-area {
        left: 16%;
        width: 72%;
        min-width: 0;
        bottom: 30.5%;
      }

      .page.lang-en .input-area {
        bottom: 31%;
      }

      .page.lang-ar .input-area {
        bottom: 29.5%;
      }

      .page.lang-both .input-area {
        bottom: 33.5%;
      }

      .input-wrap {
        box-shadow: none;
      }

      .input-wrap input {
        font-size: 16px;
        padding: 13px 14px;
      }

      .send-btn {
        font-size: 16px;
        padding: 13px 22px;
        min-width: 100px;
      }

      .lang-switch {
        right: 50%;
        transform: translateX(50%);
        bottom: 3%;
      }
    }

    @media (max-width: 560px) {
      .input-area {
        left: 16%;
        width: 72%;
      }

      .page.lang-en .input-area {
        bottom: 31%;
      }

      .page.lang-ar .input-area {
        bottom: 29%;
      }

      .page.lang-both .input-area {
        bottom: 33%;
      }

      .input-wrap input {
        font-size: 15px;
        padding: 0 12px;
      }

      .send-btn {
        min-width: 96px;
        height: 40px;
        font-size: 15px;
        padding: 0 18px;
      }

      .lang-switch button {
        min-width: 68px;
        padding: 10px 14px;
        font-size: 13px;
      }

      .action-btn {
        font-size: 17px;
        height: 54px;
      }
    }
  </style>
</head>
<body>

  <section id="landingScreen" class="screen active">
    <div id="pageRoot" class="page lang-both">

      <div class="desktop-layer">
        <img class="bg" src="BG-horizontal.png" alt="Background" />
        <img class="logo" src="Logo-horizontal.png" alt="Sadara Logo" />
        <img class="eid-title" src="Eid%20Mubarak-horizontal.png" alt="Eid Mubarak" />
        <img class="message" id="messageImg" src="Best-Wishes-Bi-horizontal.png" alt="Greeting Message" />
        <img class="plant" src="Icon-horizontal.png" alt="Plant" />
      </div>

      <div class="mobile-layer">
        <img id="mobileBg" class="mobile-bg" src="Eid-Fitr-Cards-bi.png" alt="Mobile Greeting Design" />
      </div>

      <div class="input-area">
        <div class="input-wrap">
          <input id="nameInput" type="text" maxlength="40" placeholder="...اكتب اسمك هنا" dir="rtl" />
          <button class="send-btn" id="sendBtn" type="button">Send</button>
        </div>
      </div>

      <div class="lang-switch">
        <button id="btnEn" type="button" onclick="setLang('en')">EN</button>
        <button id="btnAr" type="button" onclick="setLang('ar')">عربي</button>
        <button id="btnBoth" type="button" class="active" onclick="setLang('both')">AR&EN</button>
      </div>
    </div>
  </section>

  <section id="previewScreen" class="preview-screen">
    <div class="card-shell">
      <div id="exportCard" class="card-export">
        <img id="previewBase" src="Cards_Bi.png" alt="Final Card" />
        <div id="previewName" class="card-name both">Ahmed</div>
      </div>
    </div>

    <div class="actions">
      <button id="downloadBtn" class="action-btn primary" type="button">⬇ Download Card</button>
      <button id="newCardBtn" class="action-btn secondary" type="button">↻ New Card</button>
    </div>
  </section>

  <!-- hidden high-res renderer -->
  <div class="render-area" aria-hidden="true">
    <div id="renderCard" class="render-card">
      <img id="renderBase" src="Cards_Bi.png" alt="Render Card" />
      <div id="renderName" class="render-name both">Ahmed</div>
    </div>
  </div>

  <script>
    const landingScreen = document.getElementById('landingScreen');
    const previewScreen = document.getElementById('previewScreen');

    const pageRoot = document.getElementById('pageRoot');
    const nameInput = document.getElementById('nameInput');
    const sendBtn = document.getElementById('sendBtn');

    const messageImg = document.getElementById('messageImg');
    const mobileBg = document.getElementById('mobileBg');

    const previewBase = document.getElementById('previewBase');
    const previewName = document.getElementById('previewName');

    const renderBase = document.getElementById('renderBase');
    const renderName = document.getElementById('renderName');

    const downloadBtn = document.getElementById('downloadBtn');
    const newCardBtn = document.getElementById('newCardBtn');

    let currentLang = 'both';

    const imageCache = {};

    function preloadImage(src) {
      return new Promise((resolve, reject) => {
        if (imageCache[src]) return resolve(imageCache[src]);
        const img = new Image();
        img.onload = () => {
          imageCache[src] = img;
          resolve(img);
        };
        img.onerror = reject;
        img.src = src;
      });
    }

    function setActive(lang) {
      document.getElementById('btnEn').classList.remove('active');
      document.getElementById('btnAr').classList.remove('active');
      document.getElementById('btnBoth').classList.remove('active');

      if (lang === 'en') document.getElementById('btnEn').classList.add('active');
      if (lang === 'ar') document.getElementById('btnAr').classList.add('active');
      if (lang === 'both') document.getElementById('btnBoth').classList.add('active');
    }

    function setPageClass(lang) {
      pageRoot.classList.remove('lang-en', 'lang-ar', 'lang-both');
      if (lang === 'en') pageRoot.classList.add('lang-en');
      if (lang === 'ar') pageRoot.classList.add('lang-ar');
      if (lang === 'both') pageRoot.classList.add('lang-both');
    }

    async function setLang(lang) {
      currentLang = lang;
      setPageClass(lang);

      if (lang === 'en') {
        messageImg.src = 'Best-Wishes-Eng-horizontal.png';
        mobileBg.src = 'Eid-Fitr-Cards-En.png';
        previewBase.src = 'Cards_Eng.png';
        renderBase.src = 'Cards_Eng.png';
        previewName.className = 'card-name en';
        renderName.className = 'render-name en';

        nameInput.placeholder = 'Write your name here...';
        nameInput.dir = 'ltr';

        sendBtn.textContent = 'Send';
        downloadBtn.textContent = '⬇ Download Card';
        newCardBtn.textContent = '↻ New Card';

        await Promise.allSettled([
          preloadImage('Best-Wishes-Eng-horizontal.png'),
          preloadImage('Eid-Fitr-Cards-En.png'),
          preloadImage('Cards_Eng.png')
        ]);
      } else if (lang === 'ar') {
        messageImg.src = 'Best-Wishes-Ar-horizontal.png';
        mobileBg.src = 'Eid-Fitr-Cards-Ar.png';
        previewBase.src = 'Cards_Ar.png';
        renderBase.src = 'Cards_Ar.png';
        previewName.className = 'card-name ar';
        renderName.className = 'render-name ar';

        nameInput.placeholder = '...اكتب اسمك هنا';
        nameInput.dir = 'rtl';

        sendBtn.textContent = 'إرسال';
        downloadBtn.textContent = '⬇ تحميل البطاقة';
        newCardBtn.textContent = '↻ بطاقة جديدة';

        await Promise.allSettled([
          preloadImage('Best-Wishes-Ar-horizontal.png'),
          preloadImage('Eid-Fitr-Cards-Ar.png'),
          preloadImage('Cards_Ar.png')
        ]);
      } else {
        messageImg.src = 'Best-Wishes-Bi-horizontal.png';
        mobileBg.src = 'Eid-Fitr-Cards-bi.png';
        previewBase.src = 'Cards_Bi.png';
        renderBase.src = 'Cards_Bi.png';
        previewName.className = 'card-name both';
        renderName.className = 'render-name both';

        nameInput.placeholder = '...اكتب اسمك هنا';
        nameInput.dir = 'auto';

        sendBtn.textContent = 'Send';
        downloadBtn.textContent = '⬇ Download Card';
        newCardBtn.textContent = '↻ New Card';

        await Promise.allSettled([
          preloadImage('Best-Wishes-Bi-horizontal.png'),
          preloadImage('Eid-Fitr-Cards-bi.png'),
          preloadImage('Cards_Bi.png')
        ]);
      }

      setActive(lang);
    }

    sendBtn.addEventListener('click', function () {
      const enteredName = nameInput.value.trim();

      if (!enteredName) {
        if (currentLang === 'ar') {
          alert('يرجى كتابة الاسم أولاً');
        } else {
          alert('Please enter your name');
        }
        return;
      }

      previewName.textContent = enteredName;
      renderName.textContent = enteredName;

      landingScreen.classList.remove('active');
      previewScreen.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    newCardBtn.addEventListener('click', function () {
      previewScreen.classList.remove('active');
      landingScreen.classList.add('active');
      nameInput.value = '';
      nameInput.focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    nameInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        sendBtn.click();
      }
    });

    async function makeDownloadFromCanvas() {
      const canvas = document.createElement('canvas');
      canvas.width = 900;
      canvas.height = 1600;
      const ctx = canvas.getContext('2d');

      const file =
        currentLang === 'en' ? 'Cards_Eng.png' :
        currentLang === 'ar' ? 'Cards_Ar.png' :
        'Cards_Bi.png';

      const img = await preloadImage(file);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#6d6d6d';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.font = '800 64px Arial';

      const text = renderName.textContent || 'Name';
      const maxWidth = canvas.width * 0.76;
      const centerX = canvas.width / 2;

      let topY = 0;
      if (currentLang === 'en') topY = canvas.height * 0.528;
      if (currentLang === 'ar') topY = canvas.height * 0.468;
      if (currentLang === 'both') topY = canvas.height * 0.57;

      function wrapText(text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let line = '';

        for (let n = 0; n < words.length; n++) {
          const testLine = line ? line + ' ' + words[n] : words[n];
          const metrics = ctx.measureText(testLine);
          if (metrics.width > maxWidth && line) {
            lines.push(line);
            line = words[n];
          } else {
            line = testLine;
          }
        }
        if (line) lines.push(line);
        return lines;
      }

      const lines = currentLang === 'ar' ? [text] : wrapText(text, maxWidth);
      const lineHeight = 74;

      lines.forEach((line, index) => {
        ctx.fillText(line, centerX, topY + index * lineHeight);
      });

      const link = document.createElement('a');
      const safeName = text.replace(/[^a-zA-Z0-9\u0600-\u06FF\s_-]/g, '').trim() || 'card';
      link.download = safeName + '-sadara-card.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    downloadBtn.addEventListener('click', async function () {
      try {
        await makeDownloadFromCanvas();
      } catch (e) {
        alert('Download failed');
        console.error(e);
      }
    });

    setLang('both');
  </script>
</body>
</html>
