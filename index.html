<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Sadara Eid Greeting</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e9e4da;
overflow:hidden;
}

.container{
position:relative;
width:100vw;
height:100vh;
background:url("BG-horizontal.png") center/cover no-repeat;
}

.logo{
position:absolute;
top:40px;
left:40px;
width:180px;
}

.message{
position:absolute;
top:140px;
left:40px;
width:480px;
}

.eid{
position:absolute;
top:120px;
left:40px;
width:450px;
}

.plant{
position:absolute;
right:0;
bottom:0;
width:50%;
}

.inputBox{
position:absolute;
bottom:90px;
left:40px;
display:flex;
}

input{
width:260px;
padding:15px;
border-radius:30px;
border:none;
font-size:16px;
}

button{
margin-left:10px;
padding:15px 28px;
border-radius:30px;
border:none;
background:#555;
color:white;
font-size:16px;
cursor:pointer;
}

.lang{
position:absolute;
bottom:40px;
right:40px;
background:#555;
border-radius:25px;
padding:5px;
}

.lang button{
background:none;
border:none;
color:white;
padding:10px 18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<img src="Logo-horizontal.png" class="logo">

<img src="Eid Mubarak-horizontal.png" class="eid">

<img src="Best-Wishes-Bi-horizontal.png" class="message" id="msg">

<img src="Icon-horizontal.png" class="plant">

<div class="inputBox">

<input id="name" placeholder="Write your name here...">

<button onclick="send()">Send</button>

</div>

<div class="lang">

<button onclick="eng()">EN</button>
<button onclick="ar()">عربي</button>
<button onclick="bi()">AR&EN</button>

</div>

</div>

<script>

function eng(){

document.getElementById("msg").src="Best-Wishes-Eng-horizontal.png"

document.getElementById("name").placeholder="Write your name here..."

}

function ar(){

document.getElementById("msg").src="Best-Wishes-Ar-horizontal.png"

document.getElementById("name").placeholder="...اكتب اسمك هنا"

}

function bi(){

document.getElementById("msg").src="Best-Wishes-Bi-horizontal.png"

document.getElementById("name").placeholder="...اكتب اسمك هنا"

}

function send(){

var n=document.getElementById("name").value

alert("Card generated for "+n)

}

</script>

</body>
</html>
